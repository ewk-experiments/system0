<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      background: #080b14;
      color: #e2e8f0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #1e2a45;
    }
    .logo {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .title { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    .status {
      margin-left: auto;
      display: flex; align-items: center; gap: 4px;
      font-size: 9px; color: #34d399;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: #34d399;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 16px;
    }
    .metric {
      background: #0d1220;
      border: 1px solid #1e2a45;
      border-radius: 8px;
      padding: 10px;
    }
    .metric-label {
      font-size: 9px;
      color: #4a5c7a;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .metric-value {
      font-size: 20px;
      font-weight: 700;
      margin-top: 2px;
    }
    .metric-bar {
      height: 3px;
      background: #1e2a45;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .metric-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .cyan { color: #22d3ee; }
    .purple { color: #a78bfa; }
    .amber { color: #fbbf24; }
    .emerald { color: #34d399; }
    .red { color: #f87171; }

    .recent {
      padding: 12px 16px;
      border-top: 1px solid #1e2a45;
    }
    .recent-title {
      font-size: 9px;
      color: #4a5c7a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #131a2e;
      font-size: 10px;
    }
    .recent-item:last-child { border: none; }
    .recent-domain { color: #e2e8f0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recent-time { color: #4a5c7a; }

    .actions {
      padding: 12px 16px;
      border-top: 1px solid #1e2a45;
    }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      color: #080b14;
    }
    .btn-secondary {
      background: #0d1220;
      border: 1px solid #1e2a45;
      color: #7a8ba8;
      margin-top: 6px;
    }

    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #4a5c7a;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div class="title">SYSTEM 0</div>
    <div class="status">
      <div class="status-dot"></div>
      ACTIVE
    </div>
  </div>

  <div id="metrics" class="metrics">
    <div class="metric">
      <div class="metric-label">Focus</div>
      <div class="metric-value cyan" id="focus">--</div>
      <div class="metric-bar"><div class="metric-fill" id="focus-bar" style="width:0%;background:#22d3ee"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Novelty</div>
      <div class="metric-value purple" id="novelty">--%</div>
      <div class="metric-bar"><div class="metric-fill" id="novelty-bar" style="width:0%;background:#a78bfa"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Echo Risk</div>
      <div class="metric-value" id="echo">--%</div>
      <div class="metric-bar"><div class="metric-fill" id="echo-bar" style="width:0%;background:#fbbf24"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Cog Load</div>
      <div class="metric-value emerald" id="load">--%</div>
      <div class="metric-bar"><div class="metric-fill" id="load-bar" style="width:0%;background:#34d399"></div></div>
    </div>
  </div>

  <div class="recent" id="recent-section">
    <div class="recent-title">Recent Activity</div>
    <div id="recent-list"></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="perspective-btn">⚡ Trigger Perspective Shift</button>
    <button class="btn btn-secondary" id="dashboard-btn">Open Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
